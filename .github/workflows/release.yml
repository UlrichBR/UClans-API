name: Release Automática

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Força o uso do Node 24 para evitar avisos de depreciação
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '21' 
          distribution: 'temurin'
          cache: 'maven'
      - name: Build com Maven
        run: mvn -B clean package
      - name: Criar Release no GitHub
        id: create_release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: target/*.jar
          generate_release_notes: true
          name: "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notificar no Discord
          if: success()
	          run: |
	            curl -X POST -H "Content-Type: application/json" \
	            -d '{
	              "embeds": [{
	                "title": "🚀 API Update!",
	                "description": "**Project:** UltimateClans API\n**Version:** `${{ github.ref_name }}`\n\nThe build is complete (${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}).",
	                "color": 3066993,
	                "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
	                "footer": { "text": "GitHub - Auto-Release" }
	              }]
	            }' ${{ secrets.DISCORD_WEBHOOK }}
		  